<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Arena P2P</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #arena { width: 100vw; height: 100vh; position: relative; }
        .player { 
            position: absolute; width: 30px; height: 30px; border: 2px solid #fff;
            box-shadow: 0 0 15px currentColor; transform: translate(-50%, -50%);
            transition: all 0.05s linear; /* Smooths out network jitter */
        }
        #local-player { z-index: 5; background: #0ff; color: #0ff; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>NEON ARENA</h1>
        <p id="status">Initializing...</p>
    </div>
    <div id="arena">
        <div id="local-player" class="player"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
