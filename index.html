<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Orbit P2P</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #0ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #ui-layer { padding: 10px; text-align: center; z-index: 10; }
        #game-area { 
            position: relative; width: 95vw; height: 70vh; 
            border: 3px solid #0ff; box-shadow: 0 0 15px #0ff;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            touch-action: none; overflow: hidden; border-radius: 10px;
        }
        .player { 
            position: absolute; width: 25px; height: 25px; 
            border-radius: 50%; box-shadow: 0 0 10px currentColor;
            transition: transform 0.1s; transform: translate(-50%, -50%);
        }
        .orb { 
            position: absolute; width: 12px; height: 12px; 
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff;
            transform: translate(-50%, -50%);
        }
        input { background: #222; border: 1px solid #0ff; color: #0ff; padding: 5px; }
        button { background: #0ff; border: none; padding: 5px 15px; cursor: pointer; font-weight: bold; }
        #scoreboard { margin-top: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1>NEON ORBIT</h1>
        <div>ID: <span id="my-id">...</span></div>
        <input type="text" id="join-id" placeholder="Friend's ID">
        <button onclick="connectToFriend()">JOIN GAME</button>
        <div id="scoreboard">Score: <span id="score">0</span></div>
    </div>

    <div id="game-area">
        <div id="local-player" class="player" style="background: #0ff; color: #0ff; top: 50%; left: 50%;"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
