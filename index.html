<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON ARCADE: PRO CONTROLS</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; color: #00f7ff; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; font-size: 14px; }
        
        /* Joystick Styles */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(0, 247, 255, 0.1); border: 2px solid #00f7ff; border-radius: 50%;
            display: none; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background: #00f7ff; border-radius: 50%; box-shadow: 0 0 15px #00f7ff;
        }
        @media (pointer: coarse) { #joystick-container { display: block; } }
    </style>
</head>
<body>
    <div id="ui">STATUS: <span id="status">CONNECTING</span> | PLAYERS: <span id="count">1</span></div>
    
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const SERVER_URL = "https://typical-technological-especially-carey.trycloudflare.com"; 
        const socket = io(SERVER_URL);
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const knob = document.getElementById('joystick-knob');

        let players = {};
        let bullets = [];
        let myPos = { x: window.innerWidth/2, y: window.innerHeight/2, color: '#00f7ff', speed: 5 };
        let keys = { w: false, a: false, s: false, d: false };
        let lastSend = 0;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        // --- NETWORK ---
        socket.on('connect', () => document.getElementById('status').innerText = "ONLINE");
        socket.on('current-players', (data) => { players = data; updateUI(); });
        socket.on('player-moved', (data) => players[data.id] = data);
        socket.on('player-disconnected', (id) => { delete players[id]; updateUI(); });
        socket.on('bullet-spawned', (b) => bullets.push({ ...b, time: Date.now() }));
        function updateUI() { document.getElementById('count').innerText = Object.keys(players).length + 1; }

        // --- PC CONTROLS (WASD) ---
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        window.addEventListener('mousedown', (e) => {
            const angle = Math.atan2(e.clientY - myPos.y, e.clientX - myPos.x);
            socket.emit('shoot', { angle });
        });

        // --- MOBILE CONTROLS (JOYSTICK) ---
        let joystickActive = false;
        let moveVec = { x: 0, y: 0 };

        window.addEventListener('touchstart', (e) => {
            if (e.target.id === 'joystick-knob' || e.target.id === 'joystick-container') {
                joystickActive = true;
            } else {
                // Tap elsewhere to shoot
                const t = e.touches[0];
                const angle = Math.atan2(t.clientY - myPos.y, t.clientX - myPos.x);
                socket.emit('shoot', { angle });
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const t = e.touches[0];
            const rect = document.getElementById('joystick-container').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = t.clientX - centerX;
            let dy = t.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            moveVec.x = Math.cos(angle) * (dist / 40);
            moveVec.y = Math.sin(angle) * (dist / 40);
            
            knob.style.transform = `translate(${moveVec.x * 40}px, ${moveVec.y * 40}px)`;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            moveVec = { x: 0, y: 0 };
            knob.style.transform = `translate(0,0)`;
        });

        // --- GAME LOOP ---
        function update() {
            // PC Movement
            if (keys.w) myPos.y -= myPos.speed;
            if (keys.s) myPos.y += myPos.speed;
            if (keys.a) myPos.x -= myPos.speed;
            if (keys.d) myPos.x += myPos.speed;

            // Mobile Movement
            myPos.x += moveVec.x * myPos.speed;
            myPos.y += moveVec.y * myPos.speed;

            // Keep in bounds
            myPos.x = Math.max(0, Math.min(canvas.width, myPos.x));
            myPos.y = Math.max(0, Math.min(canvas.height, myPos.y));

            const now = Date.now();
            if (now - lastSend > 30) {
                socket.emit('move', { x: myPos.x, y: myPos.y, color: myPos.color });
                lastSend = now;
            }
        }

        function draw() {
            update();
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = Date.now();
            bullets = bullets.filter(b => now - b.time < 2000);
            bullets.forEach(b => {
                b.x += Math.cos(b.angle) * 12;
                b.y += Math.sin(b.angle) * 12;
                ctx.fillStyle = "#fff700";
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
            });

            for (let id in players) {
                if (id === socket.id) continue;
                ctx.fillStyle = players[id].color || "#ff3e3e";
                ctx.beginPath(); ctx.arc(players[id].x, players[id].y, 18, 0, Math.PI * 2); ctx.fill();
            }

            ctx.fillStyle = myPos.color;
            ctx.shadowBlur = 15; ctx.shadowColor = myPos.color;
            ctx.beginPath(); ctx.arc(myPos.x, myPos.y, 18, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
