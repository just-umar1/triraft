<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WILDWOOD SURVIVAL</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { touch-action: none; box-sizing: border-box; outline: none; }
        body { margin: 0; background: #1a2e1a; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: fixed; top: 20px; left: 20px; color: #e0ffcd; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #xp-bar { width: 200px; height: 10px; background: #000; border: 1px solid #e0ffcd; margin-top: 5px; }
        #xp-fill { width: 0%; height: 100%; background: #7cff7c; transition: 0.3s; }
        #joystick { position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; }
        #knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        @media (pointer: coarse) { #joystick { display: block; } }
    </style>
</head>
<body>
    <div id="ui">
        <div>LEVEL: <span id="lvl">1</span></div>
        <div id="xp-bar"><div id="xp-fill"></div></div>
        <div style="margin-top:10px">SPIRITS ONLINE: <span id="count">1</span></div>
    </div>
    <div id="joystick"><div id="knob"></div></div>
    <canvas id="c"></canvas>

    <script>
        const socket = io("https://your-link-here.trycloudflare.com");
        const canvas = document.getElementById('c'), ctx = canvas.getContext('c');
        
        let players = {}, bullets = [], essence = [], shadows = [];
        let myPos = { x: 1000, y: 1000, xp: 0, lvl: 1 };
        let cam = { x: 0, y: 0 }, keys = {}, joy = {x:0,y:0};

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        // --- NETWORK ---
        socket.on('essence-spawn', data => essence = data);
        socket.on('shadows-update', data => shadows = data);
        socket.on('player-moved', d => players[d.id] = d);
        socket.on('bullet-spawned', b => bullets.push({...b, t: Date.now()}));

        // --- CONTROLS ---
        window.onkeydown = e => keys[e.key.toLowerCase()] = 1;
        window.onkeyup = e => keys[e.key.toLowerCase()] = 0;
        window.onmousedown = e => {
            const worldX = e.clientX + cam.x, worldY = e.clientY + cam.y;
            socket.emit('shoot', {x: myPos.x, y: myPos.y, angle: Math.atan2(worldY-myPos.y, worldX-myPos.x)});
        };

        // Mobile Joystick
        const jContainer = document.getElementById('joystick'), knob = document.getElementById('knob');
        jContainer.ontouchmove = e => {
            let t = e.touches[0], r = jContainer.getBoundingClientRect();
            let dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
            let angle = Math.atan2(dy, dx), dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            joy = {x: Math.cos(angle)*(dist/40), y: Math.sin(angle)*(dist/40)};
            knob.style.transform = `translate(${joy.x*40}px,${joy.y*40}px)`;
        };
        jContainer.ontouchend = () => { joy = {x:0,y:0}; knob.style.transform = 'none'; };

        function draw() {
            // Movement Logic
            if(keys.w) myPos.y -= 4; if(keys.s) myPos.y += 4;
            if(keys.a) myPos.x -= 4; if(keys.d) myPos.x += 4;
            myPos.x += joy.x * 4; myPos.y += joy.y * 4;
            socket.emit('move', myPos);

            // Camera Follow
            cam.x = myPos.x - canvas.width/2;
            cam.y = myPos.y - canvas.height/2;

            // Background (Forest Floor)
            ctx.fillStyle = '#1a2e1a'; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            ctx.save();
            ctx.translate(-cam.x, -cam.y);

            // Draw Grid/Grass
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let x=0; x<2000; x+=100) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,2000); ctx.stroke(); }
            for(let y=0; y<2000; y+=100) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(2000,y); ctx.stroke(); }

            // Draw Essence (XP)
            essence.forEach(e => {
                ctx.fillStyle = '#7cff7c';
                ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, 7); ctx.fill();
                if(Math.sqrt((e.x-myPos.x)**2 + (e.y-myPos.y)**2) < 30) {
                    socket.emit('collect-essence', e.id);
                    myPos.xp += 20;
                    if(myPos.xp >= 100) { myPos.lvl++; myPos.xp = 0; document.getElementById('lvl').innerText = myPos.lvl; }
                    document.getElementById('xp-fill').style.width = myPos.xp + "%";
                }
            });

            // Draw Bullets
            bullets = bullets.filter(b => Date.now() - b.t < 1000);
            bullets.forEach(b => {
                b.x += Math.cos(b.angle)*15; b.y += Math.sin(b.angle)*15;
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,3,0,7); ctx.fill();
            });

            // Draw Me (Spirit)
            ctx.fillStyle = '#7cff7c';
            ctx.shadowBlur = 15; ctx.shadowColor = '#7cff7c';
            ctx.beginPath(); ctx.arc(myPos.x, myPos.y, 15, 0, 7); ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Others
            for(let id in players) {
                if(id === socket.id) continue;
                ctx.fillStyle = 'rgba(124, 255, 124, 0.5)';
                ctx.beginPath(); ctx.arc(players[id].x, players[id].y, 15, 0, 7); ctx.fill();
            }

            ctx.restore();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
