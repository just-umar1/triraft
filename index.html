<!DOCTYPE html>
<html>
<head>
  <title>P2P Survival Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Survival P2P</h1>

<div id="menu">

<canvas id="game" width="800" height="500"></canvas>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="script.js"></script>
</body>
</html>
