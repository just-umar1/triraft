<!DOCTYPE html>
<html>
<head>
    <title>Arcade Lobby</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; color: #ff3e3e; font-family: monospace; }
        canvas { display: block; }
        #status { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status">ESTABLISHING CONNECTION...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        // REPLACE THIS URL with your actual Localtunnel/Ngrok URL
        const SERVER_URL = "https://rotary-sensors-justice-east.trycloudflare.com";
        
        const socket = io(SERVER_URL);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let bullets = [];
        let myPos = { x: 0, y: 0 }; // Track your own position for the math
        
        socket.on('connect', () => { status.innerText = "CONNECTED TO LAPTOP SERVER"; });
        socket.on('disconnect', () => { status.innerText = "SERVER OFFLINE"; });

        // Receive the list of everyone already there
        socket.on('current-players', (serverPlayers) => { players = serverPlayers; });

        // Update a specific player when they move
        socket.on('player-moved', (data) => { players[data.id] = data; });

        // Remove a player when they leave
        socket.on('player-disconnected', (id) => { delete players[id]; });

        let lastSendTime = 0;
        // Listen for bullets from the server
socket.on('bullet-spawned', (bullet) => {
    bullets.push({
        ...bullet,
        startTime: Date.now() 
    });
});

// Detect the Click
window.addEventListener('mousedown', (e) => {
    const angle = Math.atan2(e.clientY - myPos.y, e.clientX - myPos.x);
    socket.emit('shoot', { angle: angle });
});

    window.addEventListener('mousemove', (e) => {
    const now = Date.now();
    // Only send data every 30 milliseconds (roughly 33fps)
    if (now - lastSendTime > 30) {
        const myPos = { x: e.clientX, y: e.clientY, color: '#00f7ff' };
        socket.emit('move', myPos);
        lastSendTime = now;
        }
        });

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)'; // Fading trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let id in players) {
                const p = players[id];
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color || "#ff3e3e";
                ctx.fillStyle = p.color || "#ff3e3e";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
                
            }
            requestAnimationFrame(draw);
        }
        draw();{
            function draw() {
    ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ADD THIS BLOCK:
    const now = Date.now();
    bullets = bullets.filter(b => now - b.startTime < 2000); 
    bullets.forEach(b => {
        b.x += Math.cos(b.angle) * 7; 
        b.y += Math.sin(b.angle) * 7;
        ctx.fillStyle = "#fff700";
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    // ... existing loop that draws players ...
    requestAnimationFrame(draw);
}
    </script>
</body>
</html>
