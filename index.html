<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>WILDWOOD STABLE - Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { 
            touch-action: none; 
            box-sizing: border-box; 
            user-select: none;
        }
        body { 
            margin: 0; 
            background: #0b140b; 
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
            color: #7cff7c; 
        }
        #ui { 
            position: fixed; 
            top: 15px; 
            left: 15px; 
            z-index: 10; 
            pointer-events: none; 
            text-shadow: 2px 2px 0px #000;
        }
        #joystick { 
            position: fixed; 
            bottom: 40px; 
            left: 40px; 
            width: 100px; 
            height: 100px; 
            border: 2px solid #7cff7c; 
            border-radius: 50%; 
            display: none; 
            z-index: 20;
        }
        #knob { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            width: 50px; 
            height: 50px; 
            background: #7cff7c; 
            border-radius: 50%; 
            opacity: 0.5; 
        }
        @media (pointer: coarse) { #joystick { display: block; } }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SYSTEM: <span id="st" style="color: #ff3e3e;">OFFLINE</span></div>
        <div id="score">ELIMINATIONS: 0</div>
    </div>

    <div id="joystick"><div id="knob"></div></div>
    
    <canvas id="c"></canvas>

    <script>
        // --- CONFIGURATION ---
        const socket = io("http://localhost:3000"); // Change to your server's IP/URL
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('st');

        // --- GAME STATE ---
        let players = {};
        let bullets = [];
        let shadows = [];
        let particles = [];
        let myPos = { x: 1000, y: 1000 };
        let cam = { x: 0, y: 0 };
        let keys = {};
        let joy = { x: 0, y: 0 };
        let lastTime = performance.now();
        let myScore = 0;

        // --- INITIALIZATION ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // --- INPUT HANDLING ---
        window.onkeydown = e => keys[e.key.toLowerCase()] = 1;
        window.onkeyup = e => keys[e.key.toLowerCase()] = 0;
        
        window.onmousedown = e => {
            // Prevent shooting while using joystick on mobile
            if (e.clientX < 150 && e.clientY > window.innerHeight - 150) return;
            
            const worldX = e.clientX + cam.x;
            const worldY = e.clientY + cam.y;
            const angle = Math.atan2(worldY - myPos.y, worldX - myPos.x);
            
            socket.emit('shoot', { 
                x: myPos.x, 
                y: myPos.y, 
                angle: angle, 
                t: Date.now() 
            });
        };

        // Joystick Logic
        const j = document.getElementById('joystick'), k = document.getElementById('knob');
        j.ontouchmove = e => {
            let t = e.touches[0], r = j.getBoundingClientRect();
            let dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
            let a = Math.atan2(dy, dx), d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            joy = { x: Math.cos(a) * (d / 40), y: Math.sin(a) * (d / 40) };
            k.style.transform = `translate(${joy.x * 40}px, ${joy.y * 40}px)`;
        };
        j.ontouchend = () => { joy = { x: 0, y: 0 }; k.style.transform = 'none'; };

        // --- NETWORKING ---
        socket.on('connect', () => { 
            statusEl.innerText = "ONLINE"; 
            statusEl.style.color = "#7cff7c";
        });
        
        socket.on('disconnect', () => {
            statusEl.innerText = "OFFLINE";
            statusEl.style.color = "#ff3e3e";
        });

        socket.on('state', (state) => {
            // Update others, ignore self to prevent jitter
            for (let id in state.players) {
                if (id !== socket.id) players[id] = state.players[id];
            }
            // Cleanup disconnected players
            for (let id in players) {
                if (!state.players[id]) delete players[id];
            }
            shadows = state.shadows;
        });

        socket.on('bullet-spawned', b => {
            b.t = b.t || Date.now();
            bullets.push(b);
        });

        socket.on('shadow-hit', (data) => {
            // Create particles at hit location
            for(let i=0; i<10; i++) {
                particles.push({
                    x: data.x, y: data.y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0
                });
            }
        });

        // --- CORE LOOP ---
        function draw(currentTime) {
            // 1. Delta Time Logic
            const dt = (currentTime - lastTime) / 16.67;
            lastTime = currentTime;
            const safeDt = Math.min(dt, 3);

            // 2. Movement Calculation
            let moved = false;
            const speed = 5 * safeDt;
            
            if(keys.w) { myPos.y -= speed; moved = true; }
            if(keys.s) { myPos.y += speed; moved = true; }
            if(keys.a) { myPos.x -= speed; moved = true; }
            if(keys.d) { myPos.x += speed; moved = true; }

            if(joy.x !== 0 || joy.y !== 0) {
                myPos.x += joy.x * speed;
                myPos.y += joy.y * speed;
                moved = true;
            }

            // World boundaries (0 - 2000)
            myPos.x = Math.max(15, Math.min(1985, myPos.x));
            myPos.y = Math.max(15, Math.min(1985, myPos.y));

            if(moved) socket.emit('move', { x: myPos.x, y: myPos.y });

            // 3. Camera Interpolation
            cam.x = myPos.x - canvas.width / 2;
            cam.y = myPos.y - canvas.height / 2;

            // 4. Drawing
            ctx.fillStyle = '#0b140b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cam.x, -cam.y);

            // --- World Grid ---
            ctx.strokeStyle = '#1a2e1a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<=2000; i+=100) {
                ctx.moveTo(i, 0); ctx.lineTo(i, 2000);
                ctx.moveTo(0, i); ctx.lineTo(2000, i);
            }
            ctx.stroke();

            // --- Shadows (Enemies) ---
            shadows.forEach(s => {
                ctx.fillStyle = '#ff3e3e';
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, 20, 0, Math.PI * 2); 
                ctx.fill();
                // Inner glow
                ctx.fillStyle = '#9c2424';
                ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, 7); ctx.fill();
            });

            // --- Bullets ---
            bullets = bullets.filter(b => Date.now() - b.t < 1500);
            bullets.forEach(b => {
                b.x += Math.cos(b.angle) * (15 * safeDt);
                b.y += Math.sin(b.angle) * (15 * safeDt);
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
            });

            // --- Particles ---
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx * safeDt;
                p.y += p.vy * safeDt;
                p.life -= 0.04 * safeDt;
                ctx.fillStyle = `rgba(124, 255, 124, ${p.life})`;
                ctx.fillRect(p.x, p.y, 3, 3);
            });

            // --- Other Players ---
            for(let id in players) {
                ctx.fillStyle = 'rgba(124, 255, 124, 0.4)';
                ctx.beginPath(); ctx.arc(players[id].x, players[id].y, 15, 0, Math.PI * 2); ctx.fill();
            }

            // --- Local Player ---
            ctx.fillStyle = '#7cff7c';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#7cff7c';
            ctx.beginPath(); ctx.arc(myPos.x, myPos.y, 15, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow for other drawings

            ctx.restore();
            requestAnimationFrame(draw);
        }

        // Start Loop
        requestAnimationFrame(draw);
    </script>
</body>
</html>
